apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: causalcast-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - causalcast.example.com
    secretName: causalcast-tls
  rules:
  - host: causalcast.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
