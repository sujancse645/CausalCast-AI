name: Autonomous Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Audit Profile'
        required: true
        default: 'full'
        type: choice
        options:
          - quick
          - full
          - security
          - release

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements-dev.txt
        pip install pydantic pyyaml
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
        
    - name: Run Autonomous Audit
      run: |
        PROFILE="${{ github.event.inputs.profile || 'quick' }}"
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          PROFILE="quick"
        fi
        
        bash scripts/release_audit.sh --profile $PROFILE
        
    - name: Upload Audit Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-reports
        path: reports/audit/latest/
        retention-days: 14
