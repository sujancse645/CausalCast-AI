services:
  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: sqlite:////data/causalcast.db
      CORS_ORIGINS: http://localhost:3000
      DATASET_STORAGE_ROOT: /data/raw
      PREPARATION_STORAGE_ROOT: /data/processed
      FORECAST_ARTIFACT_ROOT: /data/artifacts
      DEEP_FORECASTING_ENABLED: "true"
      DEEP_FORECASTING_ACCELERATOR: cpu
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  backend-data:
