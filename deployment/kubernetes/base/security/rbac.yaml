apiVersion: v1
kind: ServiceAccount
metadata:
  name: causalcast-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: causalcast-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: causalcast-rolebinding
subjects:
- kind: ServiceAccount
  name: causalcast-sa
roleRef:
  kind: Role
  name: causalcast-role
  apiGroup: rbac.authorization.k8s.io
